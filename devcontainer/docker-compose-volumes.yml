# Add these volumes to your docker-compose.dev.yml service
# Under services.<service>.volumes:

# volumes:
#   # ... existing volumes ...
#   # Dotfiles (contains nvim, tmux, etc.)
#   - ${HOME}/.dotfiles:/root/.dotfiles:cached
#   # Neovim data (plugins, state)
#   - ${HOME}/.local-docker/share/nvim:/root/.local/share/nvim:cached
#   # Nix store (persist installed packages)
#   - ${HOME}/.nix-docker:/nix:cached
#   # SSH agent socket (for Git SSH auth without mounting private keys)
#   - ${SSH_AUTH_SOCK}:/tmp/ssh-agent

# Under services.<service>.environment:
# environment:
#   - SSH_AUTH_SOCK=/tmp/ssh-agent

# Then run: cd ~/.dotfiles && ./devcontainer/post-install.sh
